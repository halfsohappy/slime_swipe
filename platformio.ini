; SlimeIMU Library - PlatformIO Configuration
;
; IMU sensor fusion library extracted from SlimeVR firmware.
; Provides VQF sensor fusion, calibration, and driver support for:
;   BMI160, BMI270, ICM42688, ICM45605, ICM45686,
;   LSM6DS3TRC, LSM6DSO, LSM6DSR, LSM6DSV, MPU6050,
;   BNO055, BNO080, BNO085, BNO086, ICM20948
;
; Usage: Add this library to your project's lib_deps or lib/ folder
;        and #include <SlimeIMU.h>

[platformio]
build_cache_dir = cache
default_envs = example_basic_esp32

; ============================================================
; Shared configuration for all environments
; ============================================================
[env]
lib_deps =
  https://github.com/SlimeVR/CmdParser.git
  https://github.com/adafruit/Adafruit-MCP23017-Arduino-Library.git
  https://github.com/hideakitai/PCA9547.git
monitor_speed = 115200
monitor_echo = yes
monitor_filters = colorize
framework = arduino
build_flags =
  -O2
  -std=gnu++2a
  -DFIRMWARE_VERSION='"SlimeIMU"'
  -DBOARD=BOARD_CUSTOM
  ; Sensor auto-detection is the default
  -DIMU=IMU_AUTO
  -DSECOND_IMU=IMU_AUTO
build_unflags = -Os -std=gnu++11 -std=gnu++17
build_src_filter = +<*> -<.git/> -<test/>

; ============================================================
; Example: Basic IMU on ESP32
; ============================================================
[env:example_basic_esp32]
platform = espressif32 @ 6.7.0
platform_packages =
  framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.1
  framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.1/esp32-arduino-libs-3.0.1.zip
board = esp32dev
build_flags =
  ${env.build_flags}
  -DPIN_IMU_SDA=21
  -DPIN_IMU_SCL=22
  -DPIN_IMU_INT=255
  -DPIN_IMU_INT_2=255
  -DLED_PIN=LED_OFF
build_src_filter =
  ${env.build_src_filter}
  +<../examples/basic_imu/>

; ============================================================
; Example: ESP32-S3 Super Mini
; ============================================================
[env:example_basic_esp32s3]
platform = espressif32 @ 6.7.0
platform_packages =
  framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.1
  framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.1/esp32-arduino-libs-3.0.1.zip
board = esp32s3_supermini
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=1
  -DESP32S3
  -DPIN_IMU_SDA=8
  -DPIN_IMU_SCL=9
  -DPIN_IMU_INT=255
  -DPIN_IMU_INT_2=255
  -DLED_PIN=LED_OFF

build_src_filter =
  ${env.build_src_filter}
  +<../examples/basic_imu/>

; ============================================================
; Example: ESP32-C3
; ============================================================
[env:example_basic_esp32c3]
platform = espressif32 @ 6.7.0
platform_packages =
  framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.1
  framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.1/esp32-arduino-libs-3.0.1.zip
board = lolin_c3_mini
build_flags =
  ${env.build_flags}
  -DESP32C3
  -DPIN_IMU_SDA=6
  -DPIN_IMU_SCL=7
  -DPIN_IMU_INT=255
  -DPIN_IMU_INT_2=255
  -DLED_PIN=LED_OFF

build_src_filter =
  ${env.build_src_filter}
  +<../examples/basic_imu/>

